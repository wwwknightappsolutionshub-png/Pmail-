<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="PMail+ — secure branded business email and workspace tools powered by Prohost Cloud. Open tracking, file vault, industry vertical add-ons, and career tools in one inbox."
    />
    <meta
      name="keywords"
      content="PMail+, branded business email, secure cloud mail, webmail workspace, Prohost Cloud, professional email, open tracking, file vault"
    />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="author" content="Prohost Cloud" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PMail+" />
    <meta property="og:locale" content="en_CA" />
    <meta property="og:title" content="PMail+ — Secure Cloud Mail Workspace" />
    <meta
      property="og:description"
      content="Branded business email with workspace tools, industry add-ons, and mobile PWA — powered by Prohost Cloud."
    />
    <meta property="og:image" content="https://mail.prohost.cloud/og-pmail.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PMail+ — Secure Cloud Mail" />
    <meta
      name="twitter:description"
      content="Branded mail workspace with inbox tools, tracking, and industry vertical add-ons."
    />
    <meta name="theme-color" content="#050a12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PMail+" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="canonical" href="https://mail.prohost.cloud/login" />
    <title>PMail+ — Secure Cloud Mail Workspace</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anek:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <div
        style="
          min-height: 100dvh;
          display: grid;
          place-items: center;
          background: #050a12;
          color: #94a3b8;
          font-family: system-ui, sans-serif;
        "
      >
        <div style="text-align: center">
          <div style="font-size: 1.35rem; font-weight: 600; color: #f8fafc; letter-spacing: 0.02em">PMail+</div>
          <div id="pmail-boot-hint" style="margin-top: 0.5rem; font-size: 0.9rem">Loading…</div>
        </div>
      </div>
    </div>
    <script>
      window.__PMail_BOOTED__ = false;
      window.setTimeout(function () {
        if (window.__PMail_BOOTED__) return;
        var hint = document.getElementById("pmail-boot-hint");
        if (!hint) return;
        hint.textContent =
          "Still loading… If this does not clear, unregister the PMail+ service worker (browser site settings) and reload.";
      }, 12000);
      window.addEventListener(
        "error",
        function () {
          var hint = document.getElementById("pmail-boot-hint");
          if (hint && !window.__PMail_BOOTED__) {
            hint.textContent = "App failed to load. Clear site data for this URL and reload.";
          }
        },
        true,
      );
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
